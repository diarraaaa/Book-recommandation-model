databases:
  - name: omnireads-db
    plan: free
    databaseName: omnireads
    user: omnireads

services:
  - type: web
    name: omnireads
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omnireads-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: model-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
